services:
  bot:
    build: .
    container_name: bot
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE:-}
      - SESSION_PATH=/app/data/bot.session
      - CONFIG_DIR=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    stdin_open: true
    tty: true
